<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Room</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='view_room.css') }}">
</head>
<body>
    
    <h1>Welcome to {{ room.name }}</h1>

    <a href="{{ url_for('home') }}">Home</a> |
    <a href="{{ url_for('edit_room', room_id=room._id) }}">
        Edit Room
    </a>

    <hr>

    <button type="button" id="load_older_messages_btn">
        Load Older Messages
    </button>

    <div id="messages">

        {% for message in messages %}
            <div>
                <b>{{ message.sender }}</b>
                [{{ message.created_at }}]:
                {{ message.text }}
            </div>
        {% endfor %}

    </div>

    <hr>

    <form id="message_input_form">

        <input
            type="text"
            id="message_input"
            placeholder="Enter message"
        >

        <button type="submit">
            Send
        </button>

    </form>

    <hr>

    <h3>Members</h3>

    <ul>
        {% for member in room_members %}
            <li>{{ member._id.username }}</li>
        {% endfor %}
    </ul>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>

    const socket = io();

    socket.on('connect', function () {

        socket.emit('join_room', {
            username: "{{ username }}",
            room: "{{ room._id|string }}"
        });

    });

    let message_input = document.getElementById('message_input');

    document.getElementById('message_input_form').onsubmit = function (e) {

        e.preventDefault();

        let message = message_input.value.trim();

        if (message.length > 0) {

            socket.emit('send_message', {
                username: "{{ username }}",
                room: "{{ room._id }}",
                message: message
            });

        }

        message_input.value = "";
        message_input.focus();
    };


    socket.on('receive_message', function (data) {

        const newNode = document.createElement('div');

        newNode.innerHTML =
            `<b>${data.username}</b>
             [${data.created_at}]:
             ${data.message}`;

        document.getElementById('messages')
            .appendChild(newNode);

    });


    socket.on('join_room_announcement', function (data) {

        const newNode = document.createElement('div');

        newNode.innerHTML =
            `<i>${data.username} joined the room</i>`;

        document.getElementById('messages')
            .appendChild(newNode);

    });


    let page = 0;

    document.getElementById(
        "load_older_messages_btn"
    ).onclick = () => {

        page += 1;

        fetch(
            "/rooms/{{ room._id }}/messages?page=" + page
        )
        .then(response => response.json())
        .then(messages => {

            messages.reverse().forEach(message => {
                prepend_message(
                    message.text,
                    message.sender,
                    message.created_at
                );
            });

        });

    };


    function prepend_message(
        message,
        username,
        created_at
    ) {

        const newNode = document.createElement('div');

        newNode.innerHTML =
            `<b>${username}</b>
             [${created_at}]:
             ${message}`;

        const message_div =
            document.getElementById('messages');

        message_div.insertBefore(
            newNode,
            message_div.firstChild
        );
    }


    window.onbeforeunload = function () {

        socket.emit('leave_room', {
            username: "{{ username }}",
            room: "{{ room._id }}"
        });

    };

</script>

</body>
</html>
